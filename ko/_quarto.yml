project:
  type: website
  output-dir: _site

website:
  title: "ForecastAI"
  description: "AI & Data Science 예측 연구 블로그 | Prof. Shin"
  favicon: ../favicon.ico

  navbar:
    logo: ../logo.svg
    logo-href: index.qmd
    left:
      - text: "HOME"
        href: index.qmd
      - text: "ABOUT"
        href: about.qmd
      - text: "CATEGORIES"
        href: categories.qmd
      - text: "RESEARCH"
        href: research.qmd
      - text: "CONTACT"
        href: contact.qmd
    right:
      - text: "🇺🇸 English"
        href: "../en/"
      - icon: github
        href: https://github.com/phyzik

  page-footer:
    left: "© 2026 Prof. Shin · ForecastAI"
    center: "[개인정보처리방침](privacy-policy.qmd)"
    right: "Powered by [Quarto](https://quarto.org)"

  search: true

format:
  html:
    theme: [flatly, ../custom.scss]
    lang: ko
    toc: false
    code-fold: true
    code-tools: true
    highlight-style: github
    mainfont: "Noto Sans KR"
    monofont: "JetBrains Mono"

execute:
  freeze: auto
