<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ForecastAI</title>
  <style>
    body { font-family: sans-serif; display: flex; justify-content: center; 
           align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
    .box { text-align: center; }
    .logo { font-size: 2.5rem; font-weight: 900; margin-bottom: 12px; }
    .logo span:nth-child(1) { color: #185FA5; }
    .logo span:nth-child(2) { color: #F97316; }
    p { color: #666; margin-bottom: 24px; }
    .btns { display: flex; gap: 12px; justify-content: center; }
    .btn { padding: 12px 32px; border-radius: 4px; text-decoration: none;
           font-weight: 700; font-size: 1rem; transition: opacity 0.2s; }
    .btn-ko { background: #185FA5; color: #fff; }
    .btn-en { background: #fff; color: #185FA5; border: 2px solid #185FA5; }
    .btn:hover { opacity: 0.8; }
  </style>
  <script>
    // 브라우저 언어 자동 감지
    window.onload = function() {
      const lang = navigator.language || navigator.userLanguage;
      if (lang.startsWith('ko')) {
        window.location.href = './ko/';
      } else {
        window.location.href = './en/';
      }
    }
  </script>
</head>
<body>
  <div class="box">
    <div class="logo">
      <span>Forecast</span><span>AI</span>
    </div>
    <p>AI &amp; Data Science Research Blog by Prof. Shin</p>
    <div class="btns">
      <a class="btn btn-ko" href="./ko/">🇰🇷 한국어</a>
      <a class="btn btn-en" href="./en/">🇺🇸 English</a>
    </div>
  </div>
</body>
</html>
